<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR - Jeremy's Project</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>

      AFRAME.registerComponent('osmanthus-petal', {
        schema: {
          speed: {type: 'number', default: 0.005},
          wind: {type: 'number', default: 0.002}
        },
        init: function () {
          this.resetPetal();
        },
        resetPetal: function () {

          const x = (Math.random() - 0.5) * 1.6;
          const y = 0.5 + Math.random() * 0.7;
          const z = (Math.random() - 0.5) * 0.3;
          
          this.el.setAttribute('position', {x: x, y: y, z: z});
          
          this.el.setAttribute('rotation', {
            x: Math.random() * 360, 
            y: Math.random() * 360, 
            z: Math.random() * 360
          });


          const finalScale = 0.1 + Math.random() * 0.1;
          this.el.setAttribute('scale', '0 0 0');
          this.el.setAttribute('animation__spawn', {
            property: 'scale',
            to: `${finalScale} ${finalScale} ${finalScale}`,
            dur: 800,
            easing: 'easeOutBack'
          });

          this.dropSpeed = this.data.speed + Math.random() * 0.005;
          this.rotSpeed = (Math.random() - 0.5) * 2;
          this.phase = Math.random() * Math.PI * 2; 
        },
        tick: function (time, deltaTime) {
          let pos = this.el.getAttribute('position');
          let rot = this.el.getAttribute('rotation');

          pos.y -= this.dropSpeed;
          
          pos.x += Math.sin(time / 500 + this.phase) * this.data.wind;
          
     
          rot.z += this.rotSpeed;
          rot.x += this.rotSpeed * 0.5;

          this.el.setAttribute('position', pos);
          this.el.setAttribute('rotation', rot);

          
          if (pos.y < -1.0) {
            this.resetPetal();
          }
        }
      });
      AFRAME.registerComponent('petal-generator', {
        init: function () {
          for (let i = 0; i < 15; i++) {
            let p = document.createElement('a-plane');
            p.setAttribute('src', '#flowerImg');
            p.setAttribute('transparent', 'true');
            p.setAttribute('osmanthus-petal', '');
            p.setAttribute('material', 'alphaTest: 0.5; side: double'); // 雙面顯示並優化透明度
            this.el.appendChild(p);
          }
        }
      });
    </script>

    <style>
      #ui-overlay {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        color: white; font-family: sans-serif; background: rgba(0,0,0,0.5);
        padding: 10px 20px; border-radius: 20px; z-index: 10; pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div id="ui-overlay">請對準桂花圖</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./assets/targets.mind; filterMinCF:0.001; filterBeta: 0.01;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="flowerImg" src="./assets/flower.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" petal-generator>
        </a-entity>
      
    </a-scene>
  </body>
</html>
